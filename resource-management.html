<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>资源</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg: #161d26;
      --panel: #1b252e;
      --panel-soft: #202a33;
      --panel-head: #303c47;
      --row: #26313a;
      --row-alt: #243039;
      --input: #1d2630;
      --line: #33404b;
      --line-soft: rgba(120, 140, 160, 0.18);
      --blue: #2f80ed;
      --green: #21d07a;
      --red: #ff6b61;
      --text: #dce6ef;
      --muted: #a8b3c0;
      --weak: #72808e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1440px;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    a {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      cursor: default;
    }

    .app {
      display: grid;
      grid-template-rows: 36px minmax(0, 1fr);
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      height: 36px;
      padding: 0 12px 0 4px;
      background: #161d26;
      border-bottom: 1px solid rgba(120, 140, 160, 0.18);
    }

    .top-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      color: #c7d1dc;
      background: #1a232c;
      border: 1px solid var(--line);
      border-radius: 2px;
    }

    .global-search {
      display: flex;
      align-items: center;
      width: 330px;
      height: 30px;
      padding: 0 10px;
      background: #1a232c;
      border: 1px solid var(--line);
      border-radius: 2px;
    }

    .global-search input {
      width: 100%;
      color: var(--text);
      background: transparent;
      border: 0;
      outline: none;
      font-size: 13px;
    }

    .global-search input::placeholder,
    .filter-input::placeholder {
      color: #667482;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-left: auto;
      color: #c3cbd4;
      font-size: 13px;
      white-space: nowrap;
    }

    .top-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 24px;
      color: #c3cbd4;
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 24px;
    }

    .shell {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    .rail {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      min-height: 0;
      padding-top: 8px;
      background: #151c24;
      border-right: 1px solid rgba(120, 140, 160, 0.16);
    }

    .rail .icon-button {
      width: 32px;
      height: 32px;
      padding: 0;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 2px;
    }

    .rail .icon-button:hover,
    .rail .icon-button.active {
      color: var(--blue);
      background: #203049;
      border-color: rgba(47, 128, 237, 0.4);
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 2px;
    }

    .content {
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
      padding: 14px 12px 12px 10px;
      overflow: hidden;
      background: var(--panel);
    }

    .page-title {
      height: 24px;
      color: #f0f5fa;
      font-size: 15px;
      font-weight: 500;
      line-height: 20px;
    }

    .resource-tabs {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
      height: 44px;
      overflow: hidden;
      white-space: nowrap;
      border-bottom: 1px solid rgba(120, 140, 160, 0.16);
    }

    .resource-tab {
      position: relative;
      flex: 0 0 auto;
      height: 42px;
      padding: 0;
      color: var(--text);
      background: transparent;
      border: 0;
      font-size: 14px;
    }

    .resource-tab.active {
      color: #58a6ff;
    }

    .resource-tab.active::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 2px;
      background: #2f80ed;
    }

    .filters {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 53px;
    }

    .filter-input {
      width: 288px;
      height: 30px;
      padding: 0 12px;
      color: var(--text);
      background: var(--input);
      border: 1px solid var(--line);
      border-radius: 2px;
      outline: none;
      font-size: 13px;
    }

    .filter-input:focus {
      border-color: rgba(47, 128, 237, 0.72);
      box-shadow: 0 0 0 1px rgba(47, 128, 237, 0.18);
    }

    .table-shell {
      min-height: 0;
      overflow: hidden;
      border: 1px solid rgba(120, 140, 160, 0.12);
      border-radius: 3px 3px 0 0;
      background: #19232c;
    }

    table {
      width: 100%;
      min-width: 1320px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    col:nth-child(1) { width: 12%; }
    col:nth-child(2) { width: 8.2%; }
    col:nth-child(3) { width: 15.6%; }
    col:nth-child(4) { width: 10.8%; }
    col:nth-child(5) { width: 7.8%; }
    col:nth-child(6) { width: 6.5%; }
    col:nth-child(7) { width: 9.6%; }
    col:nth-child(8) { width: 7.4%; }
    col:nth-child(9) { width: 11.1%; }
    col:nth-child(10) { width: 11%; }

    thead th {
      height: 49px;
      padding: 0 13px;
      color: #f0f5fa;
      background: var(--panel-head);
      border-right: 1px solid rgba(20, 27, 35, 0.64);
      font-size: 15px;
      font-weight: 500;
      text-align: left;
    }

    thead th:last-child {
      border-right: 0;
    }

    tbody td {
      height: 33px;
      padding: 0 13px;
      overflow: hidden;
      color: #e0e8f0;
      background: var(--row);
      border-top: 1px solid rgba(20, 27, 35, 0.46);
      border-right: 1px solid rgba(20, 27, 35, 0.42);
      font-size: 14px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr:nth-child(even) td {
      background: var(--row-alt);
    }

    tbody td:last-child {
      border-right: 0;
    }

    thead th:nth-child(7),
    tbody td:nth-child(7) {
      padding-right: 8px;
      padding-left: 8px;
    }

    .device-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .device-icon {
      flex: 0 0 auto;
      color: #4aa3ff;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--red);
    }

    .dot.online {
      background: var(--green);
    }

    .sortable {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .sort-desc-icon {
      width: 9px;
      height: 9px;
      transform: rotate(180deg);
      opacity: 0.92;
    }

    .task-select {
      width: 104px;
      max-width: 100%;
      height: 25px;
      padding: 0 24px 0 9px;
      color: #e0e8f0;
      background: #202a33;
      border: 1px solid rgba(120, 140, 160, 0.28);
      border-radius: 2px;
      outline: none;
      font-size: 13px;
    }

    .task-select:focus {
      border-color: rgba(47, 128, 237, 0.72);
      box-shadow: 0 0 0 1px rgba(47, 128, 237, 0.16);
    }

    .ops {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #4a9cff;
      font-size: 13px;
    }

    .ops a {
      color: #4a9cff;
    }

    .ops a:hover {
      color: #7db7ff;
    }

    .table-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      height: 46px;
      color: var(--muted);
      background: #1a232c;
      border: 1px solid rgba(120, 140, 160, 0.12);
      border-top: 0;
      border-radius: 0 0 3px 3px;
      padding: 0 2px;
    }

    .pager {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-right: 10px;
    }

    .page-button,
    .page-arrow,
    .page-size {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 30px;
      color: #d5dee8;
      background: #212b35;
      border: 1px solid transparent;
      border-radius: 3px;
      font-size: 14px;
    }

    .page-button.active {
      color: #ffffff;
      background: #14335d;
      border-color: #2f80ed;
    }

    .page-arrow {
      width: 24px;
      min-width: 24px;
      color: #aeb9c5;
      background: transparent;
    }

    .page-ellipsis {
      color: #6f7c89;
      letter-spacing: 4px;
    }

    .page-size {
      gap: 7px;
      width: 96px;
      margin-left: 10px;
      background: #1d2630;
      border-color: rgba(120, 140, 160, 0.24);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span class="top-icon" aria-hidden="true"><i data-lucide="maximize" width="18" height="18"></i></span>
      <label class="global-search">
        <input aria-label="全局搜索" placeholder="请输入关键字">
      </label>
      <div class="top-actions" aria-label="全局操作">
        <span class="top-action"><i data-lucide="moon" width="15" height="15"></i></span>
        <span class="top-action"><i data-lucide="languages" width="15" height="15"></i></span>
        <span class="top-action"><i data-lucide="maximize" width="15" height="15"></i></span>
        <span class="top-action"><i data-lucide="settings" width="15" height="15"></i></span>
        <span class="user-badge"><i data-lucide="circle-user-round" width="16" height="16"></i>指挥员<i data-lucide="chevron-down" width="13" height="13"></i></span>
      </div>
    </header>

    <main class="shell">
      <nav class="rail" aria-label="主导航">
        <a class="icon-button" href="fixed-wing-drone-detail.html" title="态势"><i data-lucide="globe-2" width="17" height="17"></i></a>
        <a class="icon-button active" href="resource-management.html" title="资源"><i data-lucide="clipboard-list" width="17" height="17"></i></a>
        <a class="icon-button" href="create-action-planning.html" title="檀棋"><i data-lucide="send" width="17" height="17"></i></a>
        <button class="icon-button" title="设备"><i data-lucide="server" width="17" height="17"></i></button>
        <button class="icon-button" title="航线"><i data-lucide="route" width="17" height="17"></i></button>
        <button class="icon-button" title="日程"><i data-lucide="calendar-days" width="17" height="17"></i></button>
        <button class="icon-button" title="告警"><i data-lucide="bell" width="17" height="17"></i></button>
      </nav>

      <section class="content" aria-label="资源">
        <div class="page-title">资源</div>

        <nav class="resource-tabs" aria-label="资源类型">
          <button class="resource-tab active" data-resource-type="无人机">无人机</button>
          <button class="resource-tab">无人机机场</button>
          <button class="resource-tab">望楼</button>
          <button class="resource-tab">摄像头</button>
          <button class="resource-tab">执法仪</button>
          <button class="resource-tab">硬盘录像机NVR</button>
          <button class="resource-tab">红外摄像头</button>
          <button class="resource-tab">可见光摄像头</button>
          <button class="resource-tab">雷达</button>
          <button class="resource-tab">远程监控设备</button>
          <button class="resource-tab" data-resource-type="机器狗">机器狗</button>
          <button class="resource-tab">AIS基站</button>
          <button class="resource-tab">网络视频录像机NVR</button>
          <button class="resource-tab">车辆模块</button>
          <button class="resource-tab">红外激光干扰</button>
          <button class="resource-tab">设备模组</button>
          <button class="resource-tab">追踪器</button>
          <button class="resource-tab">AOA</button>
          <button class="resource-tab">无人潜航器</button>
          <button class="resource-tab">天朗</button>
          <button class="resource-tab">镭陌</button>
          <button class="resource-tab">光电经纬仪</button>
          <button class="resource-tab">电子侦察干扰车</button>
          <button class="resource-tab">激光武器</button>
          <button class="resource-tab">...</button>
        </nav>

        <div class="filters" aria-label="资源筛选">
          <input class="filter-input" id="nameFilter" placeholder="设备名称">
          <input class="filter-input" id="serialFilter" placeholder="设备序列号">
        </div>

        <div class="table-shell">
          <table aria-label="资源列表">
            <colgroup>
              <col><col><col><col><col><col><col><col><col><col>
            </colgroup>
            <thead>
              <tr>
                <th>设备名称</th>
                <th>设备型号</th>
                <th>设备序列号</th>
                <th>设备编号</th>
                <th><span class="sortable">在线状态<i class="sort-desc-icon" data-lucide="triangle" fill="currentColor"></i></span></th>
                <th>电量/油量</th>
                <th>可执行任务类型</th>
                <th>固件版本</th>
                <th><span class="sortable">固件升级<i class="sort-desc-icon" data-lucide="triangle" fill="currentColor"></i></span></th>
                <th><span class="sortable">操作<i data-lucide="settings" width="15" height="15"></i></span></th>
              </tr>
            </thead>
            <tbody id="resourceRows">
              <tr data-resource-type="无人机" data-name="DJI M400" data-serial=""><td><span class="device-name"><i class="device-icon" data-lucide="drone" width="15" height="15"></i>DJI M400</span></td><td>DJI M400</td><td>-</td><td>-</td><td><span class="status"><span class="dot online"></span>在线</span></td><td>-</td><td><select class="task-select" aria-label="DJI M400可执行任务类型"><option selected>侦察</option><option>打击</option><option>察打一体</option></select></td><td>-</td><td>-</td><td><span class="ops"><a>数据</a><a>回溯</a><a>日志</a><a>盒子调试</a></span></td></tr>
              <tr data-resource-type="无人机" data-name="DJI M350" data-serial=""><td><span class="device-name"><i class="device-icon" data-lucide="drone" width="15" height="15"></i>DJI M350</span></td><td>DJI M350</td><td>-</td><td>-</td><td><span class="status"><span class="dot online"></span>在线</span></td><td>-</td><td><select class="task-select" aria-label="DJI M350可执行任务类型"><option>侦察</option><option selected>打击</option><option>察打一体</option></select></td><td>-</td><td>-</td><td><span class="ops"><a>数据</a><a>回溯</a><a>日志</a><a>盒子调试</a></span></td></tr>
              <tr data-resource-type="无人机" data-name="DJI M300" data-serial=""><td><span class="device-name"><i class="device-icon" data-lucide="drone" width="15" height="15"></i>DJI M300</span></td><td>DJI M300</td><td>-</td><td>-</td><td><span class="status"><span class="dot online"></span>在线</span></td><td>-</td><td><select class="task-select" aria-label="DJI M300可执行任务类型"><option selected>侦察</option><option>打击</option><option>察打一体</option></select></td><td>-</td><td>-</td><td><span class="ops"><a>数据</a><a>回溯</a><a>日志</a><a>盒子调试</a></span></td></tr>
              <tr data-resource-type="无人机" data-name="DJI 30T" data-serial=""><td><span class="device-name"><i class="device-icon" data-lucide="drone" width="15" height="15"></i>DJI 30T</span></td><td>DJI 30T</td><td>-</td><td>-</td><td><span class="status"><span class="dot online"></span>在线</span></td><td>-</td><td><select class="task-select" aria-label="DJI 30T可执行任务类型"><option selected>侦察</option><option>打击</option><option>察打一体</option></select></td><td>-</td><td>-</td><td><span class="ops"><a>数据</a><a>回溯</a><a>日志</a><a>盒子调试</a></span></td></tr>
              <tr data-resource-type="无人机" data-name="紫燕 F15" data-serial=""><td><span class="device-name"><i class="device-icon" data-lucide="drone" width="15" height="15"></i>紫燕 F15</span></td><td>紫燕 F15</td><td>-</td><td>-</td><td><span class="status"><span class="dot online"></span>在线</span></td><td>-</td><td><select class="task-select" aria-label="紫燕 F15可执行任务类型"><option selected>侦察</option><option>打击</option><option>察打一体</option></select></td><td>-</td><td>-</td><td><span class="ops"><a>数据</a><a>回溯</a><a>日志</a><a>盒子调试</a></span></td></tr>
              <tr data-resource-type="无人机" data-name="CY-9A" data-serial=""><td><span class="device-name"><i class="device-icon" data-lucide="drone" width="15" height="15"></i>CY-9A</span></td><td>CY-9A</td><td>-</td><td>-</td><td><span class="status"><span class="dot online"></span>在线</span></td><td>-</td><td><select class="task-select" aria-label="CY-9A可执行任务类型"><option>侦察</option><option>打击</option><option selected>察打一体</option></select></td><td>-</td><td>-</td><td><span class="ops"><a>数据</a><a>回溯</a><a>日志</a><a>盒子调试</a></span></td></tr>
              <tr data-resource-type="机器狗" data-name="机器狗" data-serial=""><td><span class="device-name"><i class="device-icon" data-lucide="bot" width="15" height="15"></i>机器狗</span></td><td>机器狗</td><td>-</td><td>-</td><td><span class="status"><span class="dot online"></span>在线</span></td><td>-</td><td><select class="task-select" aria-label="机器狗可执行任务类型"><option selected>侦察</option><option>打击</option><option>察打一体</option></select></td><td>-</td><td>-</td><td><span class="ops"><a>数据</a><a>回溯</a><a>日志</a><a>盒子调试</a></span></td></tr>
            </tbody>
          </table>
        </div>

        <footer class="table-footer">
          <div class="pager" aria-label="分页">
            <button class="page-arrow"><i data-lucide="chevron-left" width="16" height="16"></i></button>
            <button class="page-button active">1</button>
            <button class="page-button">2</button>
            <button class="page-button">3</button>
            <button class="page-button">4</button>
            <button class="page-button">5</button>
            <span class="page-ellipsis">...</span>
            <button class="page-button">12</button>
            <button class="page-arrow"><i data-lucide="chevron-right" width="16" height="16"></i></button>
            <button class="page-size">20 条/页<i data-lucide="chevron-down" width="14" height="14"></i></button>
          </div>
        </footer>
      </section>
    </main>
  </div>

  <script>
    const nameFilter = document.getElementById("nameFilter");
    const serialFilter = document.getElementById("serialFilter");
    const rows = [...document.querySelectorAll("#resourceRows tr")];
    let activeResourceType = "无人机";

    const filterRows = () => {
      const name = nameFilter.value.trim().toLowerCase();
      const serial = serialFilter.value.trim().toLowerCase();
      rows.forEach((row) => {
        const matchesType = row.dataset.resourceType === activeResourceType;
        const matchesName = row.dataset.name.toLowerCase().includes(name);
        const matchesSerial = row.dataset.serial.toLowerCase().includes(serial);
        row.hidden = !(matchesType && matchesName && matchesSerial);
      });
    };

    nameFilter.addEventListener("input", filterRows);
    serialFilter.addEventListener("input", filterRows);

    document.querySelectorAll(".resource-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".resource-tab").forEach((item) => item.classList.remove("active"));
        tab.classList.add("active");
        activeResourceType = tab.dataset.resourceType || tab.textContent.trim();
        filterRows();
      });
    });

    document.querySelectorAll(".page-button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".page-button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
      });
    });

    filterRows();
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
